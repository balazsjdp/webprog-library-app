name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: konyvtar
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: konyvtar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U konyvtar"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      TEST_DATABASE_URL: postgresql://konyvtar:changeme@localhost:5432/konyvtar_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Typecheck backend
        working-directory: backend
        run: npm run typecheck

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Run backend tests
        working-directory: backend
        run: npm test -- --runInBand

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build backend Docker image
        run: docker build -t konyvtar-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t konyvtar-frontend ./frontend
